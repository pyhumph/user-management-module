version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: user-management-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: Humph2026!Secure#
      DB_NAME: user_management
      JWT_SECRET: humphrey_secret_key_2026
      PORT: 5000
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: user-management-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Humph2026!Secure
      MYSQL_DATABASE: user_management
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data: